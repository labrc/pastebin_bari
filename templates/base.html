<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pastebin - bari.ar{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white">
    <nav class="bg-slate-950 border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-8">
                <a href="{% url 'index' %}"
                    class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                    paste.bari.ar
                </a>
                <div class="hidden md:flex gap-4">
                    <a href="{% url 'index' %}" class="text-sm hover:text-cyan-400 transition">Nuevo</a>
                    <a href="{% url 'notas_list' %}" class="text-sm hover:text-cyan-400 transition">Notas</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-slate-700 mt-12 py-4 text-center text-slate-400 text-sm">
        <p>paste.bari.ar - Pastebin rápido y simple — 13 de abril de 2026</p>
    </footer>
</body>

</html>
