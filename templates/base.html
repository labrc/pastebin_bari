<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pastebin — bari.ar{% endblock %}</title>
    
    <!-- Fuentes Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        bari: {
                            dark: '#030712', // bg-slate-950
                            card: '#0f172a', // bg-slate-900
                            cyan: '#06b6d4', // cyan-500
                            emerald: '#10b981', // emerald-500
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #f1f5f9;
        }
        .noise-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .bento-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bento-card:hover {
            border-color: rgba(6, 182, 212, 0.3);
            box-shadow: 0 10px 30px -10px rgba(6, 182, 212, 0.15);
        }
        .bento-glow {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 0;
        }
        .bento-card:hover .bento-glow {
            opacity: 1;
        }
        .content-z {
            position: relative;
            z-index: 10;
        }
        
        /* Scrollbar styling para textareas */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>

<body class="selection:bg-cyan-500/30 min-h-screen relative overflow-x-hidden font-sans">
    <div class="noise-bg"></div>
    
    <nav class="sticky top-0 z-50 bg-[#050505]/80 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-8">
                <a href="{% url 'index' %}" class="text-2xl font-outfit font-black tracking-tighter text-white hover:text-cyan-400 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-paste text-cyan-500"></i> paste.bari.ar
                </a>
                <div class="hidden md:flex gap-6">
                    <a href="{% url 'index' %}" class="text-sm font-bold text-slate-400 hover:text-cyan-400 transition">Nuevo</a>
                    <a href="{% url 'notas_list' %}" class="text-sm font-bold text-slate-400 hover:text-cyan-400 transition">Mis Notas</a>
                </div>
            </div>
            <div>
                <a href="https://bari.ar" class="text-xs font-bold text-slate-500 hover:text-white transition-colors border border-slate-800 rounded-full px-4 py-1.5 hover:bg-slate-800">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Hub
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-12 relative z-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="relative z-10 border-t border-white/5 mt-12 py-8 text-center text-slate-500">
        <p class="text-xs font-bold tracking-widest uppercase mb-2">
            Proyecto del Ecosistema <a href="https://bari.ar" class="text-white hover:text-cyan-400 transition-colors">BARI.AR</a>
        </p>
        <p class="text-[10px] mb-2">Desarrollado para máxima velocidad y privacidad.</p>
        <p class="text-[10px] font-mono text-slate-600">Versión Junio 2026</p>
    </footer>
</body>
</html>
